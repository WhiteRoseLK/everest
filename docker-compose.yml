services:
  harness:
    build: .
    # The harness deliberately exits (see restartIfMainAdvanced in src/loop.ts) once
    # origin/main advances past the commit it started with, since Node's ESM loader never
    # reloads modules mid-process - this policy is what turns that exit into an actual reload
    # of the merged code (issue #43).
    restart: unless-stopped
    ports:
      # Publishes the read-only status dashboard (src/dashboard.ts, issue #65), started
      # automatically alongside the loop by src/index.ts, so it's reachable from the host at
      # http://localhost:3000 without needing a shell in the container. Bound to 127.0.0.1 by
      # default rather than all interfaces: the dashboard is unauthenticated, and while its data
      # isn't secret (the repo is already public), there's no reason to expose it beyond the host
      # it runs on. Still overridable (e.g. DASHBOARD_BIND=0.0.0.0) if intentionally needed.
      - '${DASHBOARD_BIND:-127.0.0.1}:${DASHBOARD_PORT:-3000}:${DASHBOARD_PORT:-3000}'
    volumes:
      - .:/app
      - /app/node_modules
      # Named volume on the 'node' user's home directory (see Dockerfile: USER node), so Claude
      # Code's onboarding/config state (~/.claude, theme choice, credentials helper cache, etc.)
      # survives container *recreation* (image rebuild, `docker compose down`/`up`), not just a
      # restart - the anonymous container filesystem is otherwise wiped on recreation, forcing
      # onboarding/login prompts again even though CLAUDE_CODE_OAUTH_TOKEN is already set
      # (issue #63). Docker seeds a fresh named volume from the image's existing content on first
      # start, so files written at build time (e.g. the git config below) are preserved too.
      - claude_home:/home/node
      # Named volume on the harness's runtime state directory, mounted over the equivalent path
      # inside the '.:/app' bind mount above so it doesn't inherit that bind mount's ownership.
      # '.:/app' replaces the image's /app entirely with the host directory's content *and*
      # ownership - so if the host-side repo checkout isn't owned by uid 1000 (the 'node' user,
      # see Dockerfile: USER node), 'node' loses write access to /app/.harness and any write
      # (e.g. saveLastCatchupAt in src/catchup.ts) fails with EACCES (issue #75). Same fix
      # pattern as claude_home: the Dockerfile creates /app/.harness owned by node:node at build
      # time, so Docker seeds this named volume from that on first start, independent of host
      # ownership.
      - harness_state:/app/.harness
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - GH_TOKEN=${GH_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - MAX_BUDGET_USD_PER_ISSUE=${MAX_BUDGET_USD_PER_ISSUE:-2}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-60000}
      - BASE_RETRY_DELAY_MS=${BASE_RETRY_DELAY_MS:-60000}
      - MAX_RETRY_DELAY_MS=${MAX_RETRY_DELAY_MS:-3600000}
      - MAX_RETRY_COUNT=${MAX_RETRY_COUNT:-10}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-3000}

volumes:
  # See the mount comment above: persists /home/node (Claude Code onboarding/config state)
  # across `docker compose down`/`up` and image rebuilds, unlike the anonymous container
  # filesystem.
  claude_home:
  # See the mount comment above: keeps .harness/ writable by the 'node' user regardless of the
  # host-side repo checkout's ownership (issue #75).
  harness_state:
