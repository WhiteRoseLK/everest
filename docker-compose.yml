services:
  harness:
    build: .
    # The harness deliberately exits (see restartIfMainAdvanced in src/loop.ts) once
    # origin/main advances past the commit it started with, since Node's ESM loader never
    # reloads modules mid-process - this policy is what turns that exit into an actual reload
    # of the merged code (issue #43).
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
      # Named volume on the 'node' user's home directory (see Dockerfile: USER node), so Claude
      # Code's onboarding/config state (~/.claude, theme choice, credentials helper cache, etc.)
      # survives container *recreation* (image rebuild, `docker compose down`/`up`), not just a
      # restart - the anonymous container filesystem is otherwise wiped on recreation, forcing
      # onboarding/login prompts again even though CLAUDE_CODE_OAUTH_TOKEN is already set
      # (issue #63). Docker seeds a fresh named volume from the image's existing content on first
      # start, so files written at build time (e.g. the git config below) are preserved too.
      - claude_home:/home/node
    environment:
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - GH_TOKEN=${GH_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - MAX_BUDGET_USD_PER_ISSUE=${MAX_BUDGET_USD_PER_ISSUE:-2}
      - POLL_INTERVAL_MS=${POLL_INTERVAL_MS:-60000}
      - BASE_RETRY_DELAY_MS=${BASE_RETRY_DELAY_MS:-60000}
      - MAX_RETRY_DELAY_MS=${MAX_RETRY_DELAY_MS:-3600000}
      - MAX_RETRY_COUNT=${MAX_RETRY_COUNT:-10}

volumes:
  # See the mount comment above: persists /home/node (Claude Code onboarding/config state)
  # across `docker compose down`/`up` and image rebuilds, unlike the anonymous container
  # filesystem.
  claude_home:
